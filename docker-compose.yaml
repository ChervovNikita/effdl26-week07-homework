version: "3"

services:
  app:
    build:
      dockerfile: Dockerfile.http
      context: .
    ports:
      - "5000:5000"

  grpc-app:
    build:
      dockerfile: Dockerfile.grpc
      context: .
    ports:
      - "50051:50051"

  grpc-client:
    build:
      dockerfile: Dockerfile.grpc_client
      context: .
    ports:
      - "9090:9090"
