repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ruff check --fix .
        language: system
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: ruff format .
        language: system
        pass_filenames: false
      - id: ty
        name: ty
        entry: ty check .
        language: system
        pass_filenames: false
